<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>東京　配布エリア共有マップ</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css">

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<style>
/* =========================
   基本
========================= */
html,
body{
  height:100%;
  margin:0;
}

#map{
  height:100%;
}

.panel{
  position:absolute;
  background:white;
  padding:10px;
  z-index:1000;
  border-radius:8px;
  box-shadow:0 0 6px rgba(0,0,0,.3);
}

.title{
  top:15px;
  left:50%;
  transform:translateX(-50%);
  font-size:20px;
  font-weight:bold;
}

.error-text{
  color:red;
  font-size:13px;
  margin-top:4px;
  margin-bottom:8px;
  font-weight:bold;
}

/* =========================
   モーダル
========================= */
.modal-bg{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.45);
  z-index:3000;
  display:flex;
  align-items:center;
  justify-content:center;
}

.modal-box{
  background:white;
  width:90%;
  max-width:420px;
  padding:18px;
  border-radius:12px;
  box-shadow:0 0 12px rgba(0,0,0,.35);
  font-size:15px;
}

.modal-box h3{
  margin-top:0;
}

.modal-box label{
  display:block;
  margin-top:10px;
  font-weight:bold;
}

.modal-box label span{
  color:#888;
  font-weight:normal;
  font-size:12px;
}

.modal-box input,
.modal-box select,
.modal-box textarea{
  width:100%;
  box-sizing:border-box;
  padding:8px;
  margin-top:4px;
}

.date-row{
  display:flex;
  gap:6px;
}

.date-row select{
  width:33.3%;
}

.modal-buttons{
  display:flex;
  gap:10px;
  margin-top:16px;
}

.modal-buttons button{
  flex:1;
  padding:10px;
}

/* 修正依頼フォームの日付欄だけ縦並び */
#requestFormModal .date-row{
  display:block;
}

#requestFormModal .date-row select{
  width:100%;
  margin-bottom:6px;
}

/* =========================
   各パネル
========================= */

#parentNotice{
  position:absolute;
  top:100px;
  left:18px;

  z-index:1000;

  background:#fff9e8;

  border-left:5px solid #ff9800;
  border-radius:10px;

  padding:10px 12px;

  font-size:14px;
  font-weight:bold;

  color:#444;

  line-height:1.5;

  box-shadow:0 2px 6px rgba(0,0,0,0.25);
}

.contact-panel{
  top:55px;
  right:15px;
  width:auto;
  padding:8px 14px;
  display:inline-block;
}

.contact-panel button{
  width:auto;
  padding:6px 10px;
  font-size:13px;
  margin:0 auto;
  display:block;
}

.admin-history-panel{
  top:115px;
  right:15px;
  width:210px;
  height:220px;
  overflow:hidden;
  font-size:13px;
  line-height:1.5;
}

.history-title{
  margin-bottom:4px;
  cursor:pointer;
}

.history-toggle-hint{
  font-size:11px;
  color:#888;
  margin-left:6px;
}

#adminHistoryContent{
  height:180px;
  overflow-y:auto;
}

.history-item{
  border-bottom:1px solid #bbb;
  padding:8px 0;
  margin-bottom:6px;
}

.scroll-hint{
  height:18px;
  line-height:18px;
  text-align:center;
  font-size:11px;
  color:#888;
  border-top:1px solid #eee;
}

.id-search-panel{
  top:350px;
  right:15px;
  width:210px;
  padding:10px;   /* ← 修正履歴と同じにする */
}

.id-search-panel input{
  width:135px;
  padding:5px;
  font-size:12px;
}

.id-search-panel button{
  padding:5px 8px;
  font-size:12px;
}

.id-search-count{
  font-size:11px;
  color:#666;
  margin-top:4px;
  text-align:center;
}

.reset-panel{
  bottom:20px;
  left:20px;
}

.parent-link-panel{
  bottom:58px;
  left:20px;
  padding:4px 8px;
}

.parent-link-panel button{
  font-size:12px;
  padding:5px 8px;
}

/* ズームボタンを「全体表示に戻る」の上へ */
.leaflet-bottom.leaflet-left{
  bottom:52px;
}

/* =========================
   ポップアップ
========================= */
.popup-admin-btn{
  background:#eeeeee;
  border:1px solid #cccccc;
  color:#444444;
  font-size:12px;
  padding:4px 8px;
  border-radius:4px;
  cursor:pointer;
}

.popup-admin-btn:hover{
  background:#e2e2e2;
}

/* =========================
   Leaflet Draw 日本語表示
========================= */
.leaflet-draw-actions a[title="Finish drawing"],
.leaflet-draw-actions a[title="Cancel drawing"],
.leaflet-draw-actions a[title="Delete last point"]{
  font-size:0;
}

.leaflet-draw-actions a[title="Finish drawing"]::after{
  content:"囲み終わり";
  font-size:13px;
}

.leaflet-draw-actions a[title="Cancel drawing"]::after{
  content:"キャンセル";
  font-size:13px;
}

.leaflet-draw-actions a[title="Delete last point"]::after{
  content:"1つ戻る";
  font-size:13px;
}

.leaflet-draw-draw-polygon{
  width:auto !important;
  background:none !important;
}

.leaflet-draw-draw-polygon span{
  display:none;
}

.leaflet-draw-draw-polygon::after{
  content:"エリアを作図";
  font-size:17px;
  padding:5px 10px;
  background:white;
  border-radius:6px;
  border:1px solid #ccc;
}


/* 「管理者修正履歴」のデザイン */
.history-title{
  font-size:15px;
  font-weight:bold;
  background:#f5f7fa;
  padding:4px 6px;
  border-radius:5px;
}
/* 「管理者修正履歴」のデザイン */


/* =========================
   スマホ中央ポイント作図UI
========================= */
.mobile-draw-start,
.mobile-draw-panel,
.map-center-cross{
  display:none;
}


/* =========================================
   凡例デザイン
========================================= */

.legend-panel{
  right:15px;
  bottom:20px;   /* PC：右下 */
  font-size:13px;
  line-height:1.6;
  padding:8px 10px;
}

/* 色四角 */
.legend-color{
  display:inline-block;
  width:14px;
  height:14px;
  margin-right:6px;
  border-radius:3px;
  vertical-align:middle;
}

.legend-color.planned{
  background:#0066ff;   /* 配布予定（青） */
}

.legend-color.done{
  background:#ff3333;   /* 配布済（赤） */
}


@media (max-width:600px) and (pointer:coarse){
  .leaflet-draw{
    display:none !important;
  }

  #parentNotice{
    top:88px;
    left:10px;

    padding:8px 10px;

    font-size:12px;

    border-radius:8px;
  }

  .mobile-draw-start{
    display:block;
    position:absolute;
    left:6px;
    top:55px;
    z-index:2000;
    background:white;
    padding:4px;
    border-radius:8px;
    box-shadow:0 0 6px rgba(0,0,0,.3);
  }

  .mobile-draw-start button{

    font-size:8px;

    font-weight:bold;

    color:white;

    background:linear-gradient(#ff9f1a, #f58200);

    padding:4px 8px;

    border-radius:6px;

    border:2px solid white;

    box-shadow:0 2px 4px rgba(0,0,0,.25);

    text-shadow:0 1px 1px rgba(0,0,0,.25);

  }


  .mobile-draw-panel{
    display:none;
    position:absolute;
    left:6px;
    top:55px;
    z-index:2000;
    flex-direction:column;
    gap:4px;
    background:white;
    padding:6px;
    border-radius:8px;
    box-shadow:0 0 6px rgba(0,0,0,.3);
  }

  .mobile-draw-panel button{
    font-size:12px !important;
    padding:5px 7px;
  }

  /* 「ここに点を追加」だけ目立たせる */
  .mobile-draw-panel button:first-child{

    background:linear-gradient(#4da3ff, #0066ff);

    color:white;

    font-weight:bold;

    border:2px solid white;

    box-shadow:0 2px 4px rgba(0,0,0,.25);

  }

  /* 「囲み終わり」の下に少し隙間 */
  .mobile-draw-panel button:nth-child(3){
    margin-bottom:8px;
  }

  .map-center-cross{
    display:none;
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    z-index:1500;
    font-size:28px;
    font-weight:bold;
    color:#ff3333;
    pointer-events:none;
    text-shadow:0 0 3px white;
  }

  .title{
    top:8px;
    left:50%;
    right:auto;
    transform:translateX(-50%);
    font-size:12px;
    padding:6px 10px;
    width:max-content;
    max-width:92vw;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .contact-panel{
    top:55px;
    padding:3px 5px;
  }

  .contact-panel button{
    font-size:10px !important;
    padding:3px 6px !important;
  }

  .reset-panel{
    left:6px;
    bottom:80px;
    padding:5px;
  }

  .parent-link-panel{
    left:6px;
    bottom:122px;
    padding:5px;
  }

  .parent-link-panel button{
    font-size:11px;
    padding:5px 7px;
  }

  .reset-panel button{
    font-size:11px;
    padding:5px 7px;
  }

  .leaflet-bottom.leaflet-left{
    bottom:110px;
    left:6px;
  }

  .leaflet-bottom.leaflet-left .leaflet-control-zoom{
    margin-left:5px;     /* ← 左へ寄せる（小さくするほど左） */
    margin-bottom:26px;  /* ← 下へ寄せる（小さくするほど下） */
  }

  

  .id-search-panel input{
    width:105px;
    font-size:11px;
    padding:4px;
  }

  .id-search-panel button{
    font-size:11px;
    padding:4px 6px;
  }


  .id-search-panel{
    right:6px;
    bottom:6px;
    top:auto;

    width:170px;

    padding-top:5.5px;
    padding-bottom:5.5px;
    padding-left:6px;
    padding-right:6px;

    display:flex;
    align-items:center;
    gap:4px;
  }

  .id-search-count{
    order:-1;              /* 左に出す */
    font-size:9px;
    color:#666;
    margin-top:0;
    white-space:nowrap;    /* 1行固定 */
    min-width:max-content;
  }

  .history-title{
    font-size:10px;
  }

  .admin-history-panel{
    top:auto !important;
    bottom:60px !important;
    right:6px;
    width:170px;
    height:60px !important;
    max-height:none;
    font-size:11.5px;
    padding:6px;
    transition:height .2s;
  }

  .admin-history-panel.expanded{
    height:240px !important;
  }

  .admin-history-panel #adminHistoryContent{
    height:24px !important;
  }

  .admin-history-panel.expanded #adminHistoryContent{
    height:188px !important;
    overflow-y:auto;
  }

  .history-title{
    margin-bottom:2px;
  }

  .history-toggle-hint{
    font-size:10px;
  }

  .scroll-hint{
    height:14px;
    line-height:14px;
    font-size:9px;
  }

  .leaflet-popup-content{
    width:64vw !important;
    max-width:64vw !important;
    font-size:12px;
    line-height:1.4;
  }

  .leaflet-popup-content button{
    font-size:12px !important;
    padding:4px 7px !important;
  }

  .popup-main-info{
    font-size:110%;
    line-height:1.45;
  }

  input,
  select,
  textarea,
  button{
    font-size:16px !important;
  }

  .modal-bg{
    align-items:flex-start;
    overflow-y:auto;
    padding:20px 0 90px;
  }

  .modal-box{
    width:80% !important;
    max-width:80% !important;
    max-height:calc(100vh - 120px);
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
  }

  /* タイトル全体を2行構成にする */
  .history-title{
    line-height:1.2;
  }

  /* 「管理者修正履歴」だけ110% */
  .history-title strong{
    font-size:110%;
    display:block;   /* 1行目固定 */
  }

  /* 「（タップで開閉）」を2行目へ */
  .history-toggle-hint{
    display:block;
    margin-left:0;
    margin-top:3px;   /* ← 行間を広げる */
  }

  .legend-panel{
    left:6px;     /* +-ボタンの右 */
    bottom:6px;    /* 全体表示ボタンの上ラインに合わせる */
    right:auto;
    font-size:11px;
    padding:5px 7px;
  }

  body,
  input,
  select,
  textarea,
  button,
  .leaflet-container,
  .leaflet-popup-content{
    font-family: Arial, "Helvetica Neue", sans-serif;
  }

}



/* パソコンのみの設定 */
@media (hover:hover) and (pointer:fine){

  .contact-panel{
    padding:4px 8px;
  }

  .reset-panel{
    padding:4px 8px;
  }

  .history-toggle-hint{
    display:none;
  }

  .leaflet-top.leaflet-left .leaflet-draw{
    margin-top:95px;   /* 修正履歴 top:100px とほぼ上揃え */
    margin-left:10px;
  }

  .admin-history-panel{
    height:310px;   /* 約140% */
  }

  #adminHistoryContent{
    height:260px;
  }

  .id-search-panel{
    top:450px;
    padding-top:2px;
    padding-bottom:2px;
    display:flex;
    justify-content:flex-end;
    align-items:center;
    gap:4px;
  }

  /* 検索結果があるときだけ左へ拡張 */
  .id-search-panel.has-result{
    width:260px;              /* 左へ伸ばす */
    display:flex;
    justify-content:flex-end;
    align-items:center;
    gap:6px;
  }

  /* 検索結果を左端に表示 */
  .id-search-panel.has-result .id-search-count{
    order:-1;
    width:auto;
    margin-right:auto;
    text-align:left;
  }

  .leaflet-draw-draw-polygon{
    width:auto !important;
    height:auto !important;
    background:none !important;
    border:none !important;
  }

  .leaflet-draw-draw-polygon::after{

    content:"✎　エリアを作図";

    font-size:15px;   /* 26px → 約50% */
    font-weight:bold;
    color:white;

    background:linear-gradient(#ff9f1a, #f58200);

    padding:12px 14px;   /* 18×42 → 約50% */

    border-radius:6px;

    border:2px solid white;

    box-shadow:0 2px 4px rgba(0,0,0,.25);

    text-shadow:0 1px 1px rgba(0,0,0,.25);

  }

  .leaflet-draw-actions{
    left:0 !important;
    top:100% !important;
    margin-top:20px;
  }

  .leaflet-bottom.leaflet-left{
    bottom:60px;   /* 上へ移動（数値を増やすほど上） */
    left:10px;     /* 右へ移動（数値を増やすほど右） */
  }

}
/* パソコンのみの設定 */


</style>
</head>

<body>
<div id="map"></div>

<div id="parentNotice">
  ※エリア作図は<br>
  　各市町村ページにて
</div>

<!-- スマホ専用：中央ポイント作図 -->
<div class="mobile-draw-start" id="mobileDrawStart">
  <button onclick="startMobileDraw()">エリアを作図</button>
</div>

<div class="mobile-draw-panel" id="mobileDrawPanel">
  <button onclick="addMobilePoint()">ここに点を追加</button>
  <button onclick="undoMobilePoint()">1つ戻る</button>
  <button onclick="finishMobileDraw()">囲み終わり</button>
  <button onclick="cancelMobileDraw()">キャンセル</button>
</div>


<div class="map-center-cross" id="mapCenterCross">＋</div>


<!-- 配布エリア登録フォーム -->
<div id="areaFormModal" class="modal-bg" style="display:none;">
  <div class="modal-box">
    <h3>配布エリア登録</h3>
    <div id="typeError" class="error-text"></div>

    <label>※種類</label>
    <select id="formType">
      <option value="">選択する</option>
      <option value="配布予定">配布予定</option>
      <option value="配布済">配布済</option>
    </select>

    <div id="plannedDeleteNotice" style="display:none; color:#cc0000; font-size:13px; margin-top:6px; font-weight:bold;">
      ※配布予定エリアは登録から1週間で自動削除されます。
    </div>

    <label>配布予定日または配布実施日</label>
    <div class="date-row">
      <select id="formYear">
        <option value="">年（未入力も可）</option>
        <option value="2026">2026</option>
        <option value="2027">2027</option>
      </select>
      <select id="formMonth"><option value="">月（未入力も可）</option></select>
      <select id="formDay"><option value="">日（未入力も可）</option></select>
    </div>

    <label>枚数</label>
    <input id="formCount" type="number" placeholder="未入力も可">

    <label>担当者</label>
    <input id="formPerson" type="text" placeholder="匿名可・未入力も可">

    <label>備考</label>
    <textarea id="formNote" placeholder="未入力も可"></textarea>

    
    <!--<label>※合言葉</label>-->
    <input id="formPass" type="hidden" value="">
    <!--
    ※パスワード復活時は以下に置き換え
    <input id="formPass" type="password" placeholder="合言葉">
    -->


    <div class="modal-buttons">
      <button onclick="submitAreaForm()">OK</button>
      <button onclick="cancelAreaForm()">キャンセル</button>
    </div>
  </div>
</div>


<!-- 配布済フォーム -->
<div id="doneFormModal" class="modal-bg" style="display:none;">
  <div class="modal-box">
    <h3>配布済にする</h3>
    <div id="doneError" class="error-text"></div>

    <label>種類</label>
    <input type="text" value="配布済" disabled>

    <label>配布予定日または配布実施日</label>
    <div class="date-row">
      <select id="doneYear">
        <option value="">年（未入力も可）</option>
        <option value="2026">2026</option>
        <option value="2027">2027</option>
      </select>
      <select id="doneMonth"><option value="">月（未入力も可）</option></select>
      <select id="doneDay"><option value="">日（未入力も可）</option></select>
    </div>

    <label>枚数</label>
    <input id="doneCount" type="number" placeholder="未入力も可">

    <label>担当者</label>
    <input id="donePerson" type="text" placeholder="匿名可・未入力も可">

    <label>備考</label>
    <textarea id="doneNote" placeholder="未入力も可"></textarea>

    
    <!--<label>※合言葉</label>-->
    <input id="donePass" type="hidden" value="">
    <!--
    ※パスワード復活時は以下に置き換え
    <input id="donePass" type="password" placeholder="合言葉">
    -->

    <div class="modal-buttons">
      <button onclick="submitDoneForm()">配布済にする</button>
      <button onclick="cancelDoneForm()">キャンセル</button>
    </div>
  </div>
</div>


<!-- 修正依頼フォーム -->
<div id="requestFormModal" class="modal-bg" style="display:none;">
  <div class="modal-box">
    <h3>修正依頼</h3>
    <div id="requestError" class="error-text"></div>

    <label>修正したい項目だけ入力</label>

    <label>種類</label>
    <select id="requestType">
      <option value="">未入力も可</option>
      <option value="配布予定">配布予定</option>
      <option value="配布済">配布済</option>
    </select>

    <label>配布予定日または配布実施日</label>
    <div class="date-row">
      <select id="requestYear">
        <option value="">年（未入力も可）</option>
        <option value="2026">2026</option>
        <option value="2027">2027</option>
      </select>
      <select id="requestMonth"><option value="">月（未入力も可）</option></select>
      <select id="requestDay"><option value="">日（未入力も可）</option></select>
    </div>

    <label>枚数</label>
    <input id="requestCount" type="number" placeholder="未入力も可">

    <label>担当者</label>
    <input id="requestPerson" type="text" placeholder="未入力も可">

    <label>備考</label>
    <textarea id="requestNote" placeholder="未入力も可"></textarea>

    
    <!--<label>※合言葉</label>-->
    <input id="requestPass" type="hidden" value="">
    <!--
    ※パスワード復活時は以下に置き換え
    <input id="requestPass" type="password" placeholder="合言葉">
    -->

    <div class="modal-buttons">
      <button onclick="submitModifyRequest()">修正依頼</button>
      <button onclick="cancelRequestForm()">キャンセル</button>
    </div>
  </div>
</div>


<!-- 依頼選択 -->
<div id="requestChoiceModal" class="modal-bg" style="display:none;">
  <div class="modal-box">
    <h3>管理者へ依頼</h3>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwWqsCngESSQDAUjhq-1gIMppsZ3F5WlaKeN0NxdpQze32sH-5npgaswnjnWhdyS9NU/exec";

const params = new URLSearchParams(location.search);

const CURRENT_CITY = params.get("city") || "";

const IS_PARENT_PAGE = !CURRENT_CITY;

const isTouchDevice = window.matchMedia("(max-width:600px) and (pointer:coarse)").matches;
const map = L.map("map", { zoomControl:false }).setView([35.70,139.55], 10)

L.control.zoom({ position:"bottomleft" }).addTo(map);

L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution:"©OpenStreetMap"
}).addTo(map);

const drawnItems = new L.FeatureGroup();
map.addLayer(drawnItems);

const plannedItemsById = {};
const areaItemsById = {};
const areaLayersById = {};

let currentRequestId = null;
let areaFormResolver = null;
let doneFormResolver = null;
let mobileDrawing = false;
let mobilePoints = [];
let mobilePreviewLayer = null;
let ignoreNextClick = false;

// =========================
// Leaflet Draw 日本語化
// =========================
L.drawLocal.draw.toolbar.buttons.polygon = "エリアを作図";
L.drawLocal.draw.handlers.polygon.tooltip.start = "地図をクリックして配布エリアの1点目を決めてください";
L.drawLocal.draw.handlers.polygon.tooltip.cont = "続けてクリックして範囲を囲んでください。最初の点をクリックすると範囲が確定します";
L.drawLocal.draw.handlers.polygon.tooltip.end = "最初の点をクリックすると範囲が確定します";
L.drawLocal.draw.handlers.polygon.finish = {
  title:"この範囲で登録します",
  text:"この範囲で登録"
};
L.drawLocal.draw.toolbar.undo = {
  title:"直前の点を削除",
  text:"1つ戻る"
};
L.drawLocal.draw.toolbar.cancel = {
  title:"描画を中止します",
  text:"キャンセル"
};

const drawControl = new L.Control.Draw({
  position:"topleft",
  draw:{
    polygon:true,
    rectangle:false,
    circle:false,
    marker:false,
    polyline:false,
    circlemarker:false
  },
  edit:{
    featureGroup:drawnItems,
    edit:false,
    remove:false
  }
});


document.getElementById("mobileDrawStart").style.display = "none";
document.getElementById("mobileDrawPanel").style.display = "none";
document.getElementById("mapCenterCross").style.display = "none";

if(IS_PARENT_PAGE){
  document.getElementById("parentLinkPanel").style.display = "none";
}


// =========================
// 初期読み込み
// =========================
fetch("tokyo.geojson")
  .then(res => res.json())
  .then(data => {

    const filteredFeatures = IS_PARENT_PAGE
      ? data.features
      : data.features.filter(f =>
          f.properties.N03_004 === CURRENT_CITY
        );

  
    const filteredGeoJson = {
      type:"FeatureCollection",
      features:filteredFeatures
    };

    const boundary = L.geoJSON(filteredGeoJson, {

      style:{
        color:"#000",
        weight:2,
        fill:true,
        fillColor:"#dddddd",
        fillOpacity:0.5
      },

      onEachFeature:function(feature, layer){

        if(IS_PARENT_PAGE){

          layer.on("click", function(){

            const cityName = feature.properties.N03_004;

            if(!cityName) return;

            
            map.fitBounds(
              layer.getBounds(),
              getCityFitOptions()
            );

            setTimeout(function(){

              const ok = confirm(
                cityName + "ページに移動しますか？"
              );

              if(!ok) return;

              location.href =
                "map.html?city=" +
                encodeURIComponent(cityName);

            }, 400);



          });

        }

      }

    }).addTo(map);

    map.fitBounds(boundary.getBounds(), {
      padding:[40, 40]
    });

    window.fullBounds = boundary.getBounds();

  });

fetch(
  SCRIPT_URL +
  "?city=" +
  encodeURIComponent(CURRENT_CITY)
)
  .then(res => res.json())
  .then(json => {
    document.getElementById("titleBox").textContent = json.title;
    renderAdminHistory(json.areas);

    const planned = [];
    const done = [];

    json.areas.forEach(row => {
      if(!row) return;
      if(!row["ID"]) return;
      if(!row["種類"]) return;
      if(!row["図形データ"]) return;

      let geo;

      try {
        geo = JSON.parse(row["図形データ"]);
      } catch(e) {
        console.warn("図形データの読み込みをスキップしました", row["ID"], e);
        return;
      }

      if(row["種類"] === "配布予定") planned.push({ geo, row });
      if(row["種類"] === "配布済") done.push({ geo, row });
    });

    planned.forEach(drawLayer);
    done.forEach(drawLayer);
  });

// =========================
// 地図・描画
// =========================
function drawLayer(item){
  const layer = L.geoJSON(item.geo, {
    interactive: !IS_PARENT_PAGE,

    style:{
      color:getColor(item.row["種類"]),
      fillColor:getColor(item.row["種類"]),
      fillOpacity:item.row["種類"] === "配布済" ? 0.5 : 0.35
    }
  }).addTo(drawnItems);

  const id = item.row["ID"];
  const isPlanned = item.row["種類"] === "配布予定";

  areaItemsById[id] = item;
  areaLayersById[id] = layer;

  if(isPlanned){
    plannedItemsById[id] = item;
  }

  if(!IS_PARENT_PAGE){
    if(!IS_PARENT_PAGE){
      layer.bindPopup(makePopupHtml(item.row, isPlanned));

      layer.on("click", function(){
        map.fitBounds(layer.getBounds(), {
          padding:[40, 40],
        });
      });
    }
  }
}

map.on("draw:created", async function(e){
  const layer = e.layer;
  const geo = layer.toGeoJSON();
  const formData = await openAreaForm();

  if(!formData) return;

  saveNewArea(geo, layer, formData);
});

function saveNewArea(geo, layer, formData){
  fetch(SCRIPT_URL, {
    method:"POST",
    body:JSON.stringify({
      pass:formData.pass,
      city:CURRENT_CITY,
      type:formData.type,
      date:formData.date,
      count:formData.count,
      person:formData.person,
      note:formData.note,
      geometry:geo
    })
  })
  .then(res => res.json())
  .then(result => {
    if(result.status !== "OK"){
      alert("合言葉が違います");
      return;
    }

    layer.setStyle({
      color:getColor(formData.type),
      fillColor:getColor(formData.type),
      fillOpacity:formData.type === "配布済" ? 0.5 : 0.35
    });

    drawnItems.addLayer(layer);

    const newRow = {
      "ID":result.id,
      "登録日時":new Date(),
      "種類":formData.type,
      "実施日":formData.date,
      "枚数":formData.count,
      "担当者":formData.person,
      "備考":formData.note
    };

    const isPlanned = formData.type === "配布予定";
    const item = { geo, row:newRow };

    areaItemsById[newRow["ID"]] = item;
    areaLayersById[newRow["ID"]] = layer;

    if(isPlanned){
      plannedItemsById[newRow["ID"]] = item;
    }

    layer.bindPopup(makePopupHtml(newRow, isPlanned));
    layer.on("click", function(){
      map.fitBounds(layer.getBounds(), {
        padding:[40, 40],
      });
    });

    openPopupAbove(layer);
  });
}

// =========================
// スマホ中央ポイント作図
// =========================
function startMobileDraw(){
  if(!isTouchDevice) return;

  mobileDrawing = true;
  mobilePoints = [];

  if(mobilePreviewLayer){
    map.removeLayer(mobilePreviewLayer);
    mobilePreviewLayer = null;
  }

  document.getElementById("mobileDrawStart").style.display = "none";
  document.getElementById("mobileDrawPanel").style.display = "flex";
  document.getElementById("mapCenterCross").style.display = "block";

  alert("地図の中心に合わせて「ここに点を追加」を押してください。3点以上で囲めます。");
}

function addMobilePoint(){
  if(!isTouchDevice) return;

  if(!mobileDrawing){
    alert("先に「エリアを作図」を押してください");
    return;
  }

  const center = map.getCenter();
  mobilePoints.push([center.lat, center.lng]);
  updateMobilePreview();
}

function undoMobilePoint(){
  if(!isTouchDevice || mobilePoints.length === 0) return;

  mobilePoints.pop();
  updateMobilePreview();
}

function updateMobilePreview(){
  if(mobilePreviewLayer){
    map.removeLayer(mobilePreviewLayer);
    mobilePreviewLayer = null;
  }

  if(mobilePoints.length === 1){
    mobilePreviewLayer = L.circleMarker(mobilePoints[0], {
      radius:5,
      color:"#ff6600",
      fillColor:"#ff6600",
      fillOpacity:0.8
    }).addTo(map);
    return;
  }

  if(mobilePoints.length >= 2){
    mobilePreviewLayer = L.polyline(mobilePoints, {
      color:"#ff6600",
      weight:3
    }).addTo(map);
  }
}

async function finishMobileDraw(){
  if(!isTouchDevice) return;

  if(!mobileDrawing){
    alert("先に「エリアを作図」を押してください");
    return;
  }

  if(mobilePoints.length < 3){
    alert("範囲を作るには3点以上必要です");
    return;
  }

  const geo = {
    type:"Feature",
    properties:{},
    geometry:{
      type:"Polygon",
      coordinates:[mobilePoints.map(p => [p[1], p[0]])]
    }
  };

  const layer = L.geoJSON(geo).getLayers()[0];
  const formData = await openAreaForm();

  if(!formData) return;

  clearMobileDrawUi();
  saveNewArea(geo, layer, formData);
}

function cancelMobileDraw(){
  if(!isTouchDevice) return;
  clearMobileDrawUi();
}

function clearMobileDrawUi(){
  mobileDrawing = false;
  mobilePoints = [];

  if(mobilePreviewLayer){
    map.removeLayer(mobilePreviewLayer);
    mobilePreviewLayer = null;
  }

  document.getElementById("mobileDrawPanel").style.display = "none";
  document.getElementById("mobileDrawStart").style.display =
  (isTouchDevice && !IS_PARENT_PAGE)
    ? "block"
    : "none";
  document.getElementById("mapCenterCross").style.display = "none";
}

// =========================
// ポップアップ・表示
// =========================
function getColor(type){
  if(type === "配布済") return "#ff3333";
  if(type === "配布予定") return "#0066ff";
  return "#999";
}

function formatDateSimple(value){
  if(!value) return "";

  const d = new Date(value);
  if(isNaN(d)) return value;

  return d.getFullYear() + "/" + (d.getMonth() + 1) + "/" + d.getDate();
}

function openPopupAbove(layer){
  const bounds = layer.getBounds();
  const topCenter = L.latLng(
    bounds.getNorth(),
    (bounds.getEast() + bounds.getWest()) / 2
  );

  layer.openPopup(topCenter);
}

function makePopupHtml(row, isPlanned){

  let html =
    `<div class="popup-main-info">` +
    "種類：" + (row["種類"] || "") + "<br>" +
    "実施日：" + formatDateSimple(row["実施日"]) + "<br>" +
    "枚数：" + (row["枚数"] || "") + "<br>" +
    "担当：" + (row["担当者"] || "") + "<br>" +
    "備考：" + (row["備考"] || "") +
    `</div>`;


  if(isPlanned){

    let baseDate;

    if(row["登録日時"]){
      baseDate = new Date(row["登録日時"]);
    }else{
      baseDate = new Date(); // 登録直後用
    }

    if(!isNaN(baseDate)){

      const deleteDate = new Date(baseDate);
      deleteDate.setDate(deleteDate.getDate() + 7);

      html +=
        "<div style='margin-top:8px; font-size:12px; color:#cc0000;'>"
        + "このエリアは "
        + deleteDate.getFullYear() + "/"
        + (deleteDate.getMonth()+1) + "/"
        + deleteDate.getDate()
        + " に自動削除予定です"
        + "</div>";
    }

    html += `<br>
      <button onclick="convertPlannedToDone('${row["ID"]}')">配布済にする</button>`;
  }


  html += `<br><br>
    <button class="popup-admin-btn" onclick="openRequestMenu('${row["ID"]}')">管理者へ修正依頼</button>`;


  html += `
    <hr style="margin:10px 0; border:none; border-top:1px dashed #ccc;">
    <div style="font-size:12px; color:#666;">
      管理者用ID：${row["ID"]}<br>
      <button class="popup-admin-btn"
      onclick="copyAreaId('${row["ID"]}')"
      style="margin-top:4px; font-size:11px;">IDをコピー</button>
    </div>`;

  return html;
}

function copyAreaId(id){
  navigator.clipboard.writeText(id)
    .then(function(){
      alert("IDをコピーしました");
    })
    .catch(function(){
      prompt("このIDをコピーしてください", id);
    });
}

function renderAdminHistory(areas){
  const histories = areas.filter(row => row["管理者修正履歴"]);
  const box = document.getElementById("adminHistoryContent");

  if(histories.length === 0){
    box.innerHTML = "履歴なし";
    return;
  }

  box.innerHTML = histories.reverse().map(row => `
    <div class="history-item">
      修正依頼日：${formatDateSimple(row["修正依頼日時"]) || ""}<br>
      管理者修正日時：${formatDateSimple(row["管理者修正日時"]) || ""}<br>
      内容：<br>
      ${String(row["管理者修正履歴"]).replace(/\n/g, "<br>")}
    </div>
  `).join("");
}

function toggleHistoryPanel(){
  if(window.matchMedia("(max-width:600px) and (pointer:coarse)").matches){
    document.getElementById("adminHistoryBox").classList.toggle("expanded");
  }
}

// =========================
// 配布予定 → 配布済
// =========================
async function convertPlannedToDone(id){
  const item = plannedItemsById[id];

  if(!item){
    alert("配布予定データが見つかりません");
    return;
  }

  const formData = await openDoneForm(item.row);
  if(!formData) return;

  fetch(SCRIPT_URL, {
    method:"POST",
    body:JSON.stringify({
      pass:formData.pass,
      id:id + "（2）",
      baseId:id,
      city:CURRENT_CITY,
      type:"配布済",
      date:formData.date,
      count:formData.count,
      person:formData.person,
      note:formData.note,
      geometry:item.geo
    })
  })
  .then(res => res.json())
  .then(result => {
    if(result.status !== "OK"){
      alert("合言葉が違います");
      return;
    }

    const doneLayer = L.geoJSON(item.geo, {
      style:{
        color:getColor("配布済"),
        fillColor:getColor("配布済"),
        fillOpacity:0.5
      }
    }).addTo(drawnItems);

    const doneRow = {
      "ID":id + "（2）",
      "種類":"配布済",
      "実施日":formData.date,
      "枚数":formData.count,
      "担当者":formData.person,
      "備考":formData.note
    };

    const doneItem = { geo:item.geo, row:doneRow };
    areaItemsById[doneRow["ID"]] = doneItem;
    areaLayersById[doneRow["ID"]] = doneLayer;

    doneLayer.bindPopup(makePopupHtml(doneRow, false));
    doneLayer.on("click", function(){
      map.fitBounds(doneLayer.getBounds(), {
        padding:[40, 40],
      });
    });

    openPopupAbove(doneLayer);
  });
}

// =========================
// 修正・削除依頼
// =========================
function openRequestMenu(id){
  currentRequestId = id;
  document.getElementById("requestChoiceModal").style.display = "flex";
}


function chooseDeleteRequest(){
  document.getElementById("requestChoiceModal").style.display = "none";

  const ok = confirm("削除依頼を送信してよろしいですか？");
  if(!ok) return;

  sendRequestToSheet(
    currentRequestId,
    "",
    "【削除依頼】このエリアの削除をお願いします。"
  );
}

function chooseModifyRequest(){
  document.getElementById("requestChoiceModal").style.display = "none";
  openModifyRequestForm(currentRequestId);
}

function cancelRequestChoice(){
  document.getElementById("requestChoiceModal").style.display = "none";
  currentRequestId = null;
}

function openModifyRequestForm(id){
  currentRequestId = id;

  document.getElementById("requestType").value = "";
  document.getElementById("requestYear").value = "";
  document.getElementById("requestMonth").value = "";
  document.getElementById("requestDay").value = "";
  document.getElementById("requestCount").value = "";
  document.getElementById("requestPerson").value = "";
  document.getElementById("requestNote").value = "";
  document.getElementById("requestPass").value = "";
  document.getElementById("requestError").textContent = "";

  document.getElementById("requestFormModal").style.display = "flex";
}

function submitModifyRequest(){
  const pass = document.getElementById("requestPass").value;
  const errorBox = document.getElementById("requestError");

  errorBox.textContent = "";


  /*
  if(!pass){
    errorBox.textContent = "※合言葉を入力してください";
    return;
  }
  */


  const requestYear = document.getElementById("requestYear").value;
  const requestMonth = document.getElementById("requestMonth").value;
  const requestDay = document.getElementById("requestDay").value;
  const requestDate = requestYear && requestMonth && requestDay
    ? `${requestYear}/${requestMonth}/${requestDay}`
    : "";

  const requestText =
    "【修正依頼】\n" +
    "種類：" + document.getElementById("requestType").value + "\n" +
    "日付：" + requestDate + "\n" +
    "枚数：" + document.getElementById("requestCount").value + "\n" +
    "担当者：" + document.getElementById("requestPerson").value + "\n" +
    "備考：" + document.getElementById("requestNote").value;

  const ok = confirm("修正依頼を送信しますか？");
  if(!ok) return;

  document.getElementById("requestFormModal").style.display = "none";
  sendRequestToSheet(currentRequestId, pass, requestText);
}

function cancelRequestForm(){
  document.getElementById("requestFormModal").style.display = "none";
}

function sendRequestToSheet(id, pass, requestText){
  fetch(SCRIPT_URL, {
    method:"POST",
    body:JSON.stringify({
      action:"request",
      id:id,
      pass:pass,
      requestText:requestText
    })
  })
  .then(res => res.json())
  .then(result => {
    if(result.status === "OK"){
      alert("管理者への依頼を送信しました");
    }else if(result.status === "NG"){
      alert("合言葉が違います");
    }else{
      alert("対象データが見つかりませんでした");
    }
  });
}

// =========================
// フォーム
// =========================
function setupDateSelects(){
  const monthSelects = ["formMonth", "doneMonth", "requestMonth"].map(id => document.getElementById(id));
  const daySelects = ["formDay", "doneDay", "requestDay"].map(id => document.getElementById(id));

  for(let i = 1; i <= 12; i++){
    monthSelects.forEach(select => {
      select.innerHTML += `<option value="${i}">${i}</option>`;
    });
  }

  for(let i = 1; i <= 31; i++){
    daySelects.forEach(select => {
      select.innerHTML += `<option value="${i}">${i}</option>`;
    });
  }
}

setupDateSelects();

document.getElementById("formType").addEventListener("change", function(){
  document.getElementById("plannedDeleteNotice").style.display =
    this.value === "配布予定" ? "block" : "none";
});

function openAreaForm(){
  document.getElementById("formType").value = "";
  document.getElementById("plannedDeleteNotice").style.display = "none";
  document.getElementById("formYear").value = "";
  document.getElementById("formMonth").value = "";
  document.getElementById("formDay").value = "";
  document.getElementById("formCount").value = "";
  document.getElementById("formPerson").value = "";
  document.getElementById("formNote").value = "";
  document.getElementById("formPass").value = "";

function splitDateValue(value){
  if(!value) return { year:"", month:"", day:"" };

  const d = new Date(value);

  if(!isNaN(d)){
    return {
      year:String(d.getFullYear()),
      month:String(d.getMonth() + 1),
      day:String(d.getDate())
    };
  }

  const parts = String(value).split("/");
  return {
    year:parts[0] || "",
    month:parts[1] || "",
    day:parts[2] || ""
  };
}

function openDoneForm(row){
  const dateParts = splitDateValue(row["実施日"]);

  document.getElementById("doneYear").value = dateParts.year;
  document.getElementById("doneMonth").value = dateParts.month;
  document.getElementById("doneDay").value = dateParts.day;
  document.getElementById("doneCount").value = row["枚数"] || "";
  document.getElementById("donePerson").value = row["担当者"] || "";
  document.getElementById("doneNote").value = row["備考"] || "";
  document.getElementById("donePass").value = "";
  document.getElementById("doneError").textContent = "";
  document.getElementById("doneFormModal").style.display = "flex";

function openContactForm(){
  document.getElementById("contactTitle").value = "";
  document.getElementById("contactMessage").value = "";
  document.getElementById("contactName").value = "";
  document.getElementById("contactEmail").value = "";
  document.getElementById("contactNote").value = "";
  document.getElementById("contactPass").value = "";
  document.getElementById("contactError").textContent = "";
  document.getElementById("contactFormModal").style.display = "flex";
}

function submitContactForm(){
  const errorBox = document.getElementById("contactError");
  const title = document.getElementById("contactTitle").value;
  const message = document.getElementById("contactMessage").value;
  const pass = document.getElementById("contactPass").value;

  errorBox.textContent = "";

  if(!title){
    errorBox.textContent = "※タイトルを入力してください";
    return;
  }

  if(!message){
    errorBox.textContent = "※内容を入力してください";
    return;
  }

  /*
  if(!pass){
    errorBox.textContent = "※合言葉を入力してください";
    return;
  }
  */

  
  const ok = confirm("管理者へ連絡を送信しますか？");
  if(!ok) return;

  /* 送信ボタンを押したらすぐフォームを閉じる */
  document.getElementById("contactFormModal").style.display = "none";


  fetch(SCRIPT_URL, {
    method:"POST",
    body:JSON.stringify({
      action:"contact",
      pass:pass,
      title:title,
      message:message,
      name:document.getElementById("contactName").value,
      email:document.getElementById("contactEmail").value,
      note:document.getElementById("contactNote").value
    })
  })
  .then(res => res.json())
  .then(result => {
    if(result.status === "OK"){
      alert("管理者へ連絡を送信しました");
      document.getElementById("contactFormModal").style.display = "none";
    }else{
      alert("合言葉が違います");
    }
  });
}

function cancelContactForm(){
  document.getElementById("contactFormModal").style.display = "none";
}

function resetView(){
  if(window.fullBounds){
    map.fitBounds(window.fullBounds, {
      padding:[30, 30]
    });
  }
}

function searchAreaById(){
  const keyword = document.getElementById("idSearchInput").value.trim();
  const countBox = document.getElementById("idSearchResultCount");

  if(!keyword){
    alert("IDを入力してください");
    countBox.textContent = "";
    return;
  }

  const matchedIds = Object.keys(areaLayersById).filter(id => id.includes(keyword));
  countBox.textContent = matchedIds.length + "件";

  if(matchedIds.length === 0){
    alert("該当するIDのエリアが見つかりませんでした");
    return;
  }

  const layer = areaLayersById[matchedIds[0]];

  map.fitBounds(layer.getBounds(), {
    padding:[40, 40],
  });

  openPopupAbove(layer);
}

function getTapZoom(){
  return window.matchMedia("(max-width:600px)").matches ? 13 : 11;
}

function getCityFitOptions(){
  if(window.matchMedia("(max-width:600px)").matches){
    return { padding:[30, 30] };
  }

  return {
    paddingTopLeft:[20, 20],
    paddingBottomRight:[320, 20]
  };
}

// =========================
// スマホ：二本指ズーム中の誤クリック防止
// =========================
map.getContainer().addEventListener("touchstart", function(e){
  if(e.touches.length >= 2){
    ignoreNextClick = true;
  }
}, { passive:true });

map.getContainer().addEventListener("touchend", function(){
  setTimeout(function(){
    ignoreNextClick = false;
  }, 300);
}, { passive:true });

map.on("click", function(e){
  if(ignoreNextClick){
    e.originalEvent.stopPropagation();
  }
});
